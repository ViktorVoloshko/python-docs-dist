name: Build

on:
  workflow_dispatch:
  push:
    tags-ignore:
      - "v*.*.*.*"
    branches:
      - "**"
    paths:
      - .env
      - .github/workflows/build.yml
  workflow_call:
    outputs:
      artifact-id:
        description: ID of uploaded artifact
        value: ${{ jobs.build.outputs.artifact-id }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      artifact-id: ${{ steps.upload-artifacts-step.outputs.artifact-id }}
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v6
        with:
          path: ./python-docs-dist
      - name: Load .env variables
        id: dotenv
        run: sed 's/ *#.*//' ./python-docs-dist/.env | grep -ve '^$' >> "$GITHUB_OUTPUT"

      - name: Checkout CPython
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.dotenv.outputs.BUILD_FROM_REPO }}
          ref: ${{ steps.dotenv.outputs.BUILD_FROM_REF }}
          path: ./cpython

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ steps.dotenv.outputs.BUILD_WITH_PYTHON }}
          working-directory: ${{ github.workspace }}/cpython/Doc
          enable-cache: false
      - name: Install Python
        run: uv python install --default

      - name: Install TeX Live
        uses: zauguin/install-texlive@v4
        with:
          packages: scheme-full

      - name: Install dependencies
        run: |
          make venv
          sudo apt-get install librsvg2-bin
        working-directory: ${{ github.workspace }}/cpython/Doc

      - name: Build documentation
        run: make dist
        working-directory: ${{ github.workspace }}/cpython/Doc

      - name: Upload artifacts
        id: upload-artifacts-step
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: |
            ${{ github.workspace }}/cpython/Doc/dist/*.zip
            ${{ github.workspace }}/cpython/Doc/dist/*.tar.bz2
            ${{ github.workspace }}/cpython/Doc/dist/*.epub
