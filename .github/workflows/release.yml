name: Release

on:
  push:
    tags:
      - "v*.*.*.*"

jobs:
  call-build:
    name: Call Build workflow
    uses: ./.github/workflows/build.yml
  release:
    name: Release
    needs: call-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v6
        with:
          path: ./python-docs-dist
      - name: Load .env variables
        id: dotenv
        run: sed 's/ *#.*//' ./python-docs-dist/.env | grep -ve '^$' >> "$GITHUB_OUTPUT"

      - name: Download artifact from Build
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ needs.call-build.outputs.artifact-id }}

      - name: Publish artifacts
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: ${{ steps.dotenv.outputs.RELEASE_SET_LATEST }}
          prerelease: ${{ steps.dotenv.outputs.RELEASE_SET_PRERELEASE }}
          files: |
            ${{ github.workspace }}/*.zip
            ${{ github.workspace }}/*.tar.bz2
            ${{ github.workspace }}/*.epub
